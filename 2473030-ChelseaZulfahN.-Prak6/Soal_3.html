<html>
<head>
    <title>2473030-Chelsea Zulfah Nabilla</title>
    <style>
        table {
            width: 800px;
            height: 600px;
            border-collapse: collapse;
        }
        td {
            border: 1px solid white;
        }
        .isi {
            background-color: orange;
        }
    </style>

    <script>
        function Piramida() {
            var n = document.getElementById("tinggi").value;
            n = parseInt(n);

            if (isNaN(n) || n <= 0) {
                alert("tinggi piramida harus angka");
                return;
            }
            var hasil = "<table>";
            for (var i = 1; i <= n; i++) {
                hasil += "<tr>";

                for (var j = 1; j <= n - i; j++) {
                    hasil += "<td></td>";
                }

                for (var k = 1; k <= (2 * i - 1); k++) {
                    hasil += "<td class='isi'></td>";
                }
                hasil += "</tr>";
            }
            hasil += "</table>";
            document.getElementById("output").innerHTML = hasil;
        }
    </script>
</head>
<body>
    Tinggi Piramida: <input type="text" id="tinggi">
    <br>
    <button onclick="Piramida()">proses</button>
    <div id="output"></div>
</body>
</html>
