<html>
<head>
    <title>2473030-Chelsea Zulfah Nabilla</title>
    <style>
        body {
            font-family: Arial;
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        td {
            width: 50px;
            height: 50px;
            text-align: center;
            border: 2px solid black;
            font-size: 20px;
        }
    </style>
    
    <script>
        function mulai() {
            var input;
            do {
                input = prompt("A number?");
            } while (isNaN(input) || input == "");
            var n = parseInt(input);
            var hasil = "<table>";
            for (var i = 1; i <= n; i++) {
                hasil += "<tr>";
                hasil += "<td>" + i + "</td>";
                hasil += "<td>x</td>";
                hasil += "<td>" + n + "</td>";
                hasil += "<td>=</td>";
                hasil += "<td>" + (i * n) + "</td>";
                hasil += "</tr>";
            }
            hasil += "</table>";
            document.getElementById("tabel").innerHTML = hasil;
        }
    </script>
</head>
<body onload="mulai()">
<div id="tabel"></div>
</body>
</html>
