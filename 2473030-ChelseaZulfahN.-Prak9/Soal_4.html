<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473030-Chelsea Zulfah Nabilla</title>
</head>
<body>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        .kotakTabel {
            width: 120px;
            margin: 50px auto;
            padding: 10px;
            box-shadow: 4px 4px 8px gray;
        }
        table {
            margin: auto;
        }
        td {
            width: 60px;
            text-align: center;
            padding: 8px;
        }
    </style>
    <script>
        $(document).ready(function(){
            $(".header").click(function(){
                var flag = $(this).prop("checked");
                if(flag == true){
                    $(".body").prop("checked", true);
                }
                else{
                    $(".body").prop("checked", false);
                }
            });
        });
    </script>
</head>
<body>
<div class="kotakTabel">
    <table border="1" cellpadding="0" cellspacing="0">
        <tr>
            <td>
                <input class="header" type="checkbox"><br>
                <hr>
                <input class="body" type="checkbox"><br><br>
                <input class="body" type="checkbox"><br><br>
                <input class="body" type="checkbox"><br><br>
                <input class="body" type="checkbox"><br><br>
                <input class="body" type="checkbox">
            </td>
        </tr>
    </table>
</div>
</body>
</html>
