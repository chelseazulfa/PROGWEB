<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473030-Chelsea Zulfah Nabilla</title>
</head>
<body> 
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        .kotakMenu {
            width: 500px;
            padding: 10px;
            border: 1px solid gray;
            box-shadow: 4px 4px 8px gray;
        }
        ol {
            margin: 0;
            padding: 0;
        }
        li {
            list-style: none;
        }
        li.item {
            width: 145px;
            float: left;
            margin-right: 10px;
            background-color: deeppink;
            position: relative;
        }
        li.item a {
            color: white;
            text-decoration: underline;
            display: block;
            padding: 3px;
        }
        li.item ol {
            border: 2px solid deeppink;
            background-color: white;
            position: absolute;
            width: 140px;
        }
        li.item ol li {
            color: black;
            padding: 2px;
        }
        .clear {
            clear: both;
        }
    </style>
    <script>
        $(document).ready(function(){
            $("li.item ol").hide();
            $("li.item").hover(
                function(){
                    $("li.item ol").hide();
                    $(this).children("ol").show();
                },
                function(){
                    $(this).children("ol").hide();
                }
            );
        });
    </script>
</head>
<body>
<div class="kotakMenu">
    <ol>
        <li class="item">
            <a href="#">jQuery</a>
            <ol>
                <li>Download</li>
                <li>Documentation</li>
                <li>Blog</li>
            </ol>
        </li>
        <li class="item">
            <a href="#">Community</a>
            <ol>
                <li>Mailing List</li>
                <li>Tutorials</li>
                <li>Demos</li>
                <li>Plugins</li>
            </ol>
        </li>
        <li class="item">
            <a href="#">Development</a>
            <ol>
                <li>Source Code</li>
                <li>Bug Tracking</li>
                <li>Recent Changes</li>
            </ol>
        </li>
    </ol>
    <div class="clear"></div>
</div>
</body>
</html>
