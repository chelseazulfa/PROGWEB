<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473030-Chelsea Zulfah Nabilla</title>
</head>
<body>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
    .kotakUtama {
        width: 560px;
        padding: 10px;
        margin: 20px;
        border: 1px solid lightgray;
        box-shadow: 4px 4px 8px gray;
    }
    .kotak {
        width: 40px;
        height: 40px;
        border: 2px solid blue;
        margin: 5px;
        float: left;
    }
    .merah {
        background-color: red;
    }
    .kuning {
        background-color: yellow;
    }
    .clear {
        clear: both;
    }
</style>
<script>
    $(document).ready(function(){
        $(".kotak").click(function(){
            $(".kotak").removeClass("merah");
            $(this).addClass("merah");
        });
        $("#btnWarna").click(function(){
            $(".kotak").each(function(){
                if($(this).hasClass("merah")){
                    return false;
                }
                $(this).addClass("kuning");
            });
        });
     });
    </script>
</head>
<body>
    <div class="kotakUtama">
        <button id="btnWarna">Change colors</button>
        <br><br>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="kotak"></div>
        <div class="clear"></div>
    </div>
</body>
</html>
