<html>
<head>
    <title>2473030-Chelsea Zulfah Nabilla</title>
</head>
<body>

<form>
<table border="1" cellpadding="15" width="400" >

<tr>
<td colspan="2" align="center">
    <h2> Form Tambah Data User</h2>
</td>
</tr>

<tr>
    <td>Name</td>
    <td>
        <input type="text" required oninvalid="this.setCustomValidity('Name is required!!!')" oninput="this.setCustomValidity('')">
    </td>
</tr>

<tr>
    <td>Address</td>
    <td>
        <input type="text" required oninvalid="this.setCustomValidity('Address is required!!!')" oninput="this.setCustomValidity('')">
    </td>
</tr>

<tr>
    <td>Email</td>
    <td>
        <input type="email" required>
    </td>
</tr>

<tr>
    <td>Home Page</td>
    <td>
        <input type="url">
    </td>
</tr>

<tr>
    <td>Birthday</td>
    <td>
        <input type="date">
    </td>
</tr>

<tr>
    <td>Favorit Color</td>
    <td>
        <input type="color">
    </td>
</tr>

<tr>
    <td>IPK</td>
    <td>
        <input type="number" min="0" max="4" step="0.1" value="0">
    </td>
</tr>

<tr>
    <td>Phone Number</td>
    <td>
        <input type="text" pattern="[0-9]{3}-[0-9]{7,10}" placeholder="123-1234567">
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Add">
    </td>
</tr>

</table>

</form>

</body>
</html>
